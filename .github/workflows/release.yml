name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GLIMMER_MCP_PYPI_SPEC: mcp==1.26.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shell syntax
        run: bash -n glimmer-claude glimmer-log glimmer-mcp install.sh scripts/build-release-checksums.sh

      - name: Install MCP runtime
        run: python3 -m pip install "${GLIMMER_MCP_PYPI_SPEC}"

      - name: Python tests
        run: python3 -m unittest discover -s tests -q

      - name: Build release checksums
        run: bash scripts/build-release-checksums.sh > SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums with Sigstore
        run: |
          cosign sign-blob \
            --yes \
            --output-signature SHA256SUMS.txt.sig \
            --output-certificate SHA256SUMS.txt.pem \
            SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SHA256SUMS.txt
            SHA256SUMS.txt.sig
            SHA256SUMS.txt.pem
