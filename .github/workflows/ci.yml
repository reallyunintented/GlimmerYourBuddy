name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GLIMMER_MCP_PYPI_SPEC: mcp==1.26.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shell syntax
        run: bash -n glimmer-claude glimmer-log glimmer-mcp install.sh scripts/build-release-checksums.sh

      - name: Install MCP runtime
        run: python3 -m pip install "${GLIMMER_MCP_PYPI_SPEC}"

      - name: Python tests
        run: python3 -m unittest discover -s tests -q
