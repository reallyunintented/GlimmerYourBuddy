name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shell syntax
        run: bash -n glimmer-claude glimmer-log install.sh

      - name: Python tests
        run: python3 -m unittest discover -s tests -q
